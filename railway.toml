[build]
builder = "dockerfile"
preDeployCommand = "bunx prisma@6 generate"

[deploy]
startCommand = "sh railway-start.sh"
preDeployCommand = "bunx prisma@6 generate && bunx prisma@6 db push --skip-generate"
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
